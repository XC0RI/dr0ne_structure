<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#000000"/>
  <title>DR0NE</title>
  <link rel="stylesheet" href="/style.css"/>
  <link rel="preload" href="/fonts/GeistDr0ne-Medium.woff2" as="font" type="font/woff2" crossorigin/>
</head>
<body>

  <!-- ── Collage backdrop ─────────────────────────────────────────────── -->
  <div id="collage-stack"></div>

  <!-- ── DR0NE — static centre label / archive toggle ────────────────── -->
  <div id="drone-label" role="button" aria-label="Open archive" tabindex="0">
    DR0NE
  </div>

  <!-- ── Screenshot button ───────────────────────────────────────────── -->
  <button id="screenshot-btn" aria-label="Screenshot">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <!-- crosshair -->
      <line x1="12" y1="2"  x2="12" y2="7"/>
      <line x1="12" y1="17" x2="12" y2="22"/>
      <line x1="2"  y1="12" x2="7"  y2="12"/>
      <line x1="17" y1="12" x2="22" y2="12"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </button>

  <!-- ── Screenshot flash overlay ─────────────────────────────────────── -->
  <div id="screenshot-flash"></div>

  <!-- ── Archive overlay ──────────────────────────────────────────────── -->
  <div id="archive-overlay" role="dialog" aria-label="Archive" aria-modal="true">
    <div id="admin-bar" class="admin-controls"></div>
    <div id="filter-bar"></div>

    <table id="archive-table">
      <thead id="archive-thead"></thead>
      <tbody id="archive-tbody"></tbody>
    </table>
  </div>

  <!-- ── Upload / Edit modal ──────────────────────────────────────────── -->
  <div id="modal-overlay"></div>

  <!-- ── Login modal (separate, simpler) ─────────────────────────────── -->
  <div id="login-overlay" class="hidden" style="
    position:fixed;inset:0;z-index:300;
    background:rgba(0,0,0,0.85);
    display:flex;align-items:center;justify-content:center;">
    <div class="modal">
      <h2>login</h2>
      <label>password</label>
      <input type="password" id="login-password" autocomplete="current-password"/>
      <div class="modal-error" id="login-error"></div>
      <button class="btn" id="login-submit">enter</button>
      <button class="btn" id="login-cancel" style="margin-left:8px">cancel</button>
    </div>
  </div>

  <script type="module">
    import { initCollage, blurCollage, unblurCollage, setArchiveOpen } from '/src/collage.js';
    import { openArchive, closeArchive, renderTableHeader } from '/src/archive.js';
    import { openUploadModal, openEditModal }           from '/src/upload-ui.js';
    import { isLoggedIn, login }                       from '/src/auth.js';

    // ── Build archive table header ─────────────────────────────────────
    renderTableHeader();

    // ── Fetch images from D1 ───────────────────────────────────────────
    let images = [];
    async function loadImages() {
      try {
        const res  = await fetch('/api/images');
        const data = await res.json();
        images = data.images ?? [];
      } catch (err) {
        console.error('Failed to load images:', err);
        images = [];
      }
    }

    // Expose reload hook for upload/edit modules
    window.__reloadImages = async () => {
      await loadImages();
      if (document.getElementById('archive-overlay').classList.contains('open')) {
        openArchive(images);
      }
    };

    // Expose modal hooks for archive module
    window.__openUploadModal = openUploadModal;
    window.__openEditModal   = openEditModal;

    // ── Init ───────────────────────────────────────────────────────────
    await loadImages();
    initCollage(images);

    // ── DR0NE click: toggle archive ────────────────────────────────────
    const droneLabel   = document.getElementById('drone-label');
    const archiveOverlay = document.getElementById('archive-overlay');

    droneLabel.addEventListener('click', () => {
      const isOpen = archiveOverlay.classList.contains('open');
      const screenshotBtn = document.getElementById('screenshot-btn');
      if (isOpen) {
        closeArchive();
        unblurCollage();
        setArchiveOpen(false);
        droneLabel.setAttribute('aria-label', 'Open archive');
        screenshotBtn.style.display = '';
      } else {
        openArchive(images);
        blurCollage();
        setArchiveOpen(true);
        droneLabel.setAttribute('aria-label', 'Close archive');
        screenshotBtn.style.display = 'none';
      }
    });

    droneLabel.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        droneLabel.click();
      }
    });

    // Escape key closes archive
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && archiveOverlay.classList.contains('open')) {
        closeArchive();
        unblurCollage();
        setArchiveOpen(false);
        document.getElementById('screenshot-btn').style.display = '';
      }
    });

    // ── Login flow ─────────────────────────────────────────────────────
    // Hidden login trigger: hold Shift and click DR0NE when archive is open
    droneLabel.addEventListener('click', (e) => {
      if (e.shiftKey && !isLoggedIn() && archiveOverlay.classList.contains('open')) {
        showLoginModal();
      }
    });

    function showLoginModal() {
      const lo = document.getElementById('login-overlay');
      lo.classList.remove('hidden');
      lo.style.display = 'flex';
      document.getElementById('login-password').focus();
    }

    function hideLoginModal() {
      const lo = document.getElementById('login-overlay');
      lo.classList.add('hidden');
      lo.style.display = '';
      document.getElementById('login-error').textContent = '';
      document.getElementById('login-password').value = '';
    }

    document.getElementById('login-submit').addEventListener('click', async () => {
      const pw  = document.getElementById('login-password').value;
      const err = document.getElementById('login-error');
      err.textContent = '';
      try {
        await login(pw);
        hideLoginModal();
        // Refresh archive to show admin controls
        openArchive(images);
      } catch (e) {
        err.textContent = e.message;
      }
    });

    document.getElementById('login-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('login-submit').click();
    });

    document.getElementById('login-cancel').addEventListener('click', hideLoginModal);
  </script>

  <script>
    document.getElementById('screenshot-btn').addEventListener('click', async () => {
      const btn   = document.getElementById('screenshot-btn');
      const flash = document.getElementById('screenshot-flash');

      btn.style.visibility = 'hidden';

      try {
        const dpr = window.devicePixelRatio || 1;
        const vw  = window.innerWidth;
        const vh  = window.innerHeight;

        // Final canvas = exact viewport size
        const canvas = document.createElement('canvas');
        canvas.width  = vw * dpr;
        canvas.height = vh * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        // Black background
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, vw, vh);

        // Draw each frame: replicate object-fit:cover + transform:scale/translate
        const frames = document.querySelectorAll('.frame');
        for (const frame of frames) {
          const rect = frame.getBoundingClientRect();
          const img  = frame.querySelector('img');
          if (!img || !img.complete) continue;

          const iw = img.naturalWidth;
          const ih = img.naturalHeight;
          const fw = rect.width;
          const fh = rect.height;

          // Parse transform from inline style: scale(z) translate(tx%, ty%)
          const styleTransform = img.style.transform || '';
          const scaleMatch     = styleTransform.match(/scale\(([\d.]+)\)/);
          const translateMatch = styleTransform.match(/translate\(([-\d.]+)%,\s*([-\d.]+)%\)/);
          const zoom = scaleMatch     ? parseFloat(scaleMatch[1])     : 1;
          const tx   = translateMatch ? parseFloat(translateMatch[1]) : 0;
          const ty   = translateMatch ? parseFloat(translateMatch[2]) : 0;

          // object-fit: cover
          const coverScale = Math.max(fw / iw, fh / ih);
          const dispW = iw * coverScale;
          const dispH = ih * coverScale;

          // Replicate CSS transform exactly using canvas transforms:
          // transform-origin: center → translate to center, apply scale+translate, translate back
          ctx.save();
          ctx.beginPath();
          ctx.rect(rect.left, rect.top, fw, fh);
          ctx.clip();

          // Move to frame center
          ctx.translate(rect.left + fw / 2, rect.top + fh / 2);
          // Apply scale
          ctx.scale(zoom, zoom);
          // Apply translate (% of frame size)
          ctx.translate((tx / 100) * fw, (ty / 100) * fh);
          // Draw image centered (cover already centers it)
          ctx.drawImage(img, -dispW / 2, -dispH / 2, dispW, dispH);
          ctx.restore();

          // Draw frame-info text
          const info = frame.querySelector('.frame-info');
          if (info) {
            const isPortrait = window.innerHeight > window.innerWidth;
            const pad        = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--pad')) || 24;
            const fsinfo     = parseFloat(getComputedStyle(info).fontSize) || 11;
            const isLeft     = rect.left < vw / 2;  // true = left frame, false = right frame
            const isTop      = rect.top  < vh / 2;  // true = top frame (portrait), false = bottom

            ctx.save();
            ctx.beginPath();
            ctx.rect(rect.left, rect.top, fw, fh);
            ctx.clip();
            ctx.font         = `500 ${fsinfo}px GeistDr0ne, sans-serif`;
            ctx.fillStyle    = 'rgba(255,255,255,0.95)';
            ctx.shadowColor  = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur   = 4;

            const lines = Array.from(info.querySelectorAll('p')).map(p => p.textContent.trim()).filter(Boolean);
            const lineH  = fsinfo * 1.5;

            let textX, textY, baseline, direction;

            if (isPortrait) {
              // Portrait: left-aligned, top frame → top-left, bottom frame → bottom-left
              textX     = rect.left + pad;
              ctx.textAlign    = 'left';
              if (isTop) {
                // top frame: draw from top down
                baseline = 'top';
                ctx.textBaseline = 'top';
                textY = rect.top + pad;
                for (let i = 0; i < lines.length; i++) {
                  ctx.fillText(lines[i], textX, textY + i * lineH);
                }
              } else {
                // bottom frame: draw from bottom up
                ctx.textBaseline = 'bottom';
                textY = rect.bottom - pad;
                for (let i = lines.length - 1; i >= 0; i--) {
                  ctx.fillText(lines[i], textX, textY);
                  textY -= lineH;
                }
              }
            } else {
              // Landscape: left frame → bottom-left, right frame → bottom-right
              ctx.textBaseline = 'bottom';
              textY = rect.bottom - pad;
              if (isLeft) {
                textX = rect.left + pad;
                ctx.textAlign = 'left';
              } else {
                textX = rect.right - pad;
                ctx.textAlign = 'right';
              }
              for (let i = lines.length - 1; i >= 0; i--) {
                ctx.fillText(lines[i], textX, textY);
                textY -= lineH;
              }
            }
            ctx.restore();
          }
        }

        // Draw DR0NE label
        const dl    = document.getElementById('drone-label');
        const dlR   = dl.getBoundingClientRect();
        const fsRaw = getComputedStyle(dl).fontSize;
        const fs    = parseFloat(fsRaw) || 28;
        ctx.save();
        ctx.font         = `500 ${fs}px GeistDr0ne, sans-serif`;
        ctx.fillStyle    = '#ffffff';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor  = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur   = 16;
        ctx.fillText('DR0NE', dlR.left + dlR.width / 2, dlR.top + dlR.height / 2);
        ctx.restore();

        // Watermark
        ctx.save();
        const wmSize = Math.round(fs / 2);
        ctx.font         = `500 ${wmSize}px GeistDr0ne, sans-serif`;
        ctx.fillStyle    = 'rgba(255,255,255,0.13)';
        ctx.textBaseline = 'middle';
        const wmText    = 'https://dr0ne.world ';
        const wmMetrics = ctx.measureText(wmText);
        const tw        = wmMetrics.width;
        const th        = wmSize * 2.5;
        const cw        = vw;
        const ch        = vh;
        ctx.translate(cw / 2, ch / 2);
        ctx.rotate(-35 * Math.PI / 180);
        const diag = Math.sqrt(cw * cw + ch * ch);
        const cols = Math.ceil(diag / tw) + 2;
        const rows = Math.ceil(diag / th) + 2;
        for (let row = -rows; row <= rows; row++) {
          for (let col = -cols; col <= cols; col++) {
            ctx.fillText(wmText, col * tw, row * th);
          }
        }
        ctx.restore();

        // Flash + download
        const dataUrl = canvas.toDataURL('image/png');
        flash.innerHTML = `<img src="${dataUrl}" alt="screenshot" style="width:100%;height:100%;object-fit:contain;display:block;background:#000"/>`;
        flash.style.display = 'block';

        const a = document.createElement('a');
        a.href     = dataUrl;
        a.download = `dr0ne-${Date.now()}.png`;
        a.click();

        setTimeout(() => {
          flash.style.display = 'none';
          flash.innerHTML = '';
        }, 1000);

      } finally {
        btn.style.visibility = '';
      }
    });
  </script>
</body>
</html>
