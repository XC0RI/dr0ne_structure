name = "dr0ne"
compatibility_date = "2025-01-01"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "dr0ne_db"
database_id = "380fa1f8-4122-4f11-b324-89d3675e9552"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "drone-bucket"

# Secrets (set via Cloudflare Dashboard → Workers & Pages → dr0ne → Settings → Variables):
# ADMIN_PASSWORD  – the login password
# JWT_SECRET      – random string for token signing (e.g. openssl rand -hex 32)
