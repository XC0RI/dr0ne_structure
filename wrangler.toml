name = "dr0ne"
compatibility_date = "2025-01-01"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "dr0ne-d1"
database_id = "f6d7e408-75b3-49f3-bbb5-566c00cf9aca"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "dr0ne-r2"

# Secrets (set via Cloudflare Dashboard → Workers & Pages → dr0ne → Settings → Variables):
# ADMIN_PASSWORD  – the login password
# JWT_SECRET      – random string for token signing (e.g. openssl rand -hex 32)
